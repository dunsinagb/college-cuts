kind = "web"
previewPath = "/"
title = "CollegeCuts Tracker"
version = "1.0.0"
id = "artifacts/college-cuts"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25948

[services.development]
run = "pnpm --filter @workspace/college-cuts run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/college-cuts", "run", "build" ]
publicDir = "artifacts/college-cuts/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25948"
BASE_PATH = "/"
