name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install

      - name: Run linting
        run: pnpm lint

      - name: Run Jest tests
        run: pnpm test:coverage
        env:
          NODE_ENV: test

      - name: Build application
        run: pnpm build
        env:
          NODE_ENV: production

      - name: Start server
        run: pnpm start &
        env:
          NODE_ENV: production
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}

      - name: Wait for server
        run: npx wait-on http://localhost:3000

      - name: Run Playwright tests
        run: pnpm test:e2e
        env:
          BASE_URL: http://localhost:3000
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report

      - name: Install Lighthouse CI
        run: npm install -g @lhci/cli@0.12.x

      - name: Run Lighthouse CI
        run: |
          lhci autorun --upload.target=temporary-public-storage
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}
        continue-on-error: true

      - name: Run Lighthouse Performance Check
        run: |
          # Run Lighthouse on key pages
          npx lighthouse http://localhost:3000 --output=json --output-path=./lighthouse-home.json --chrome-flags="--headless --no-sandbox --disable-dev-shm-usage"
          npx lighthouse http://localhost:3000/cuts --output=json --output-path=./lighthouse-cuts.json --chrome-flags="--headless --no-sandbox --disable-dev-shm-usage"
          npx lighthouse http://localhost:3000/analytics --output=json --output-path=./lighthouse-analytics.json --chrome-flags="--headless --no-sandbox --disable-dev-shm-usage"

          # Extract performance scores
          echo "Home page performance score: $(node -e "console.log(JSON.parse(require('fs').readFileSync('./lighthouse-home.json')).categories.performance.score * 100)")"
          echo "Cuts page performance score: $(node -e "console.log(JSON.parse(require('fs').readFileSync('./lighthouse-cuts.json')).categories.performance.score * 100)")"
          echo "Analytics page performance score: $(node -e "console.log(JSON.parse(require('fs').readFileSync('./lighthouse-analytics.json')).categories.performance.score * 100)")"

          # Check if any score is below 90
          HOME_SCORE=$(node -e "console.log(Math.round(JSON.parse(require('fs').readFileSync('./lighthouse-home.json')).categories.performance.score * 100))")
          CUTS_SCORE=$(node -e "console.log(Math.round(JSON.parse(require('fs').readFileSync('./lighthouse-cuts.json')).categories.performance.score * 100))")
          ANALYTICS_SCORE=$(node -e "console.log(Math.round(JSON.parse(require('fs').readFileSync('./lighthouse-analytics.json')).categories.performance.score * 100))")

          if [ $HOME_SCORE -lt 90 ] || [ $CUTS_SCORE -lt 90 ] || [ $ANALYTICS_SCORE -lt 90 ]; then
            echo "❌ Lighthouse performance score below 90 detected!"
            echo "Home: $HOME_SCORE, Cuts: $CUTS_SCORE, Analytics: $ANALYTICS_SCORE"
            exit 1
          else
            echo "✅ All Lighthouse performance scores are >= 90"
          fi

      - name: Run Lighthouse PWA Audit
        run: |
          # Run PWA-specific Lighthouse audit
          npx lighthouse http://localhost:3000 --output=json --output-path=./lighthouse-pwa.json --chrome-flags="--headless --no-sandbox --disable-dev-shm-usage" --only-categories=pwa

          # Extract PWA score
          PWA_SCORE=$(node -e "console.log(Math.round(JSON.parse(require('fs').readFileSync('./lighthouse-pwa.json')).categories.pwa.score * 100))")
          echo "PWA score: $PWA_SCORE"

          # Check PWA score (should be >= 80 for good PWA)
          if [ $PWA_SCORE -lt 80 ]; then
            echo "❌ Lighthouse PWA score below 80 detected!"
            echo "PWA Score: $PWA_SCORE"
            exit 1
          else
            echo "✅ Lighthouse PWA score is >= 80"
          fi

          # Check for specific PWA requirements
          PWA_AUDIT=$(node -e "
            const report = JSON.parse(require('fs').readFileSync('./lighthouse-pwa.json'));
            const audits = report.audits;
            
            const requiredChecks = [
              'installable-manifest',
              'service-worker',
              'offline-start-url',
              'works-offline'
            ];
            
            const failedChecks = requiredChecks.filter(check => 
              audits[check] && audits[check].score !== 1
            );
            
            if (failedChecks.length > 0) {
              console.log('❌ PWA requirements not met:');
              failedChecks.forEach(check => {
                console.log(\`  - \${check}: \${audits[check] ? audits[check].title : 'Missing'}\`);
              });
              process.exit(1);
            } else {
              console.log('✅ All PWA requirements met');
            }
          ")

      - name: Upload Lighthouse reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-reports
          path: |
            lighthouse-*.json
            .lighthouseci/

      - name: Comment PR with results
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');

            let comment = '## 🚀 CI Results\n\n';

            // Jest results
            try {
              const coverage = JSON.parse(fs.readFileSync('./coverage/coverage-summary.json', 'utf8'));
              const total = coverage.total;
              comment += `### 📊 Test Coverage\n`;
              comment += `- **Lines**: ${total.lines.pct}%\n`;
              comment += `- **Functions**: ${total.functions.pct}%\n`;
              comment += `- **Branches**: ${total.branches.pct}%\n`;
              comment += `- **Statements**: ${total.statements.pct}%\n\n`;
            } catch (e) {
              comment += `### 📊 Test Coverage\n❌ Coverage report not available\n\n`;
            }

            // Lighthouse results
            try {
              const homeScore = Math.round(JSON.parse(fs.readFileSync('./lighthouse-home.json', 'utf8')).categories.performance.score * 100);
              const cutsScore = Math.round(JSON.parse(fs.readFileSync('./lighthouse-cuts.json', 'utf8')).categories.performance.score * 100);
              const analyticsScore = Math.round(JSON.parse(fs.readFileSync('./lighthouse-analytics.json', 'utf8')).categories.performance.score * 100);
              
              comment += `### ⚡ Performance Scores\n`;
              comment += `- **Home**: ${homeScore}/100 ${homeScore >= 90 ? '✅' : '❌'}\n`;
              comment += `- **Cuts**: ${cutsScore}/100 ${cutsScore >= 90 ? '✅' : '❌'}\n`;
              comment += `- **Analytics**: ${analyticsScore}/100 ${analyticsScore >= 90 ? '✅' : '❌'}\n\n`;
            } catch (e) {
              comment += `### ⚡ Performance Scores\n❌ Lighthouse reports not available\n\n`;
            }

            comment += `### 🧪 Test Results\n`;
            comment += `- **Jest**: ✅ Passed\n`;
            comment += `- **Playwright**: ✅ Passed\n`;
            comment += `- **Lighthouse**: ${process.env.LIGHTHOUSE_PASSED === 'true' ? '✅ Passed' : '❌ Failed'}\n`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });
