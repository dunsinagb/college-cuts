<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1200" height="630" fill="#0f172a"/>
  
  <!-- Glowing background effect -->
  <defs>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.8"/>
      <stop offset="70%" stop-color="#3b82f6" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0"/>
    </radialGradient>
    
    <linearGradient id="capGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
    
    <filter id="glowFilter">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge> 
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <linearGradient id="textGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#e2e8f0"/>
    </linearGradient>
  </defs>
  
  <!-- Glow effect -->
  <circle cx="600" cy="315" r="200" fill="url(#glow)" opacity="0.6"/>
  
  <!-- Main container with rounded corners -->
  <rect x="100" y="100" width="400" height="400" fill="url(#capGradient)" rx="20" filter="url(#glowFilter)"/>
  
  <!-- Graduation Cap -->
  <g transform="translate(600, 315)">
    <!-- Cap base -->
    <path d="M-80 -50 L80 -50 L60 -20 L-60 -20 Z" fill="#ffffff" opacity="0.9"/>
    
    <!-- Cap top -->
    <path d="M-60 -20 L60 -20 L40 10 L-40 10 Z" fill="#ffffff" opacity="0.95"/>
    
    <!-- Tassel -->
    <circle cx="0" cy="10" r="5" fill="#fbbf24"/>
    <path d="M0 15 L0 40 M-5 20 L5 20 M-2.5 25 L2.5 25 M-2.5 30 L2.5 30 M-2.5 35 L2.5 35" 
          stroke="#fbbf24" stroke-width="2" fill="none"/>
    
    <!-- Cap details -->
    <rect x="-50" y="-15" width="100" height="5" fill="#3b82f6" opacity="0.8"/>
    <rect x="-40" y="-5" width="80" height="2" fill="#3b82f6" opacity="0.6"/>
  </g>
  
  <!-- Text -->
  <g>
    <!-- Main Title -->
    <text x="600" y="500" text-anchor="middle" fill="url(#textGradient)" font-family="Arial, sans-serif" font-size="48" font-weight="bold">
      CollegeCuts
    </text>
    
    <!-- Subtitle -->
    <text x="600" y="540" text-anchor="middle" fill="#94a3b8" font-family="Arial, sans-serif" font-size="24" font-weight="normal">
      Track University Program Cuts & Closures
    </text>
    
    <!-- Tagline -->
    <text x="600" y="580" text-anchor="middle" fill="#64748b" font-family="Arial, sans-serif" font-size="18" font-weight="normal">
      Comprehensive Database • Real-time Data • 2024-2025
    </text>
  </g>
  
  <!-- Subtle inner glow -->
  <circle cx="600" cy="315" r="150" fill="none" stroke="#ffffff" stroke-width="2" opacity="0.2"/>
</svg> 